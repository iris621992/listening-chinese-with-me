<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{title}}</title>
  <link rel="stylesheet" href="{{assetPath}}assets/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="brand" href="{{homePath}}" aria-label="Listening With Me Home">
        <span class="brand-mark">听</span>
        <span>
          <strong>Listening With Me</strong>
          <small data-i18n="brand_tagline">Gentle stories for steady progress</small>
        </span>
      </a>
      <nav class="header-controls" aria-label="Primary navigation">
        <a class="nav-tab is-active" href="{{homePath}}" data-i18n="home">Home</a>
        <a class="nav-tab" href="{{homePath}}#languages" data-i18n="languages">Languages</a>
        <a class="nav-tab" href="{{homePath}}#how-it-works" data-i18n="how_it_works">How it works</a>
        <a class="nav-tab" href="{{homePath}}/chinese/#latest-lessons" data-i18n="latest_lessons">Latest Lessons</a>
      </nav>
      <div class="header-right">
        <select id="interface-language" class="lang-select" aria-label="Interface language">
          <option value="en">English</option>
          <option value="vi">Tiếng Việt</option>
        </select>
      </div>
    </div>
  </header>
  <main class="wrap">{{content}}</main>
  <footer class="site-footer wrap">
    <p>© Listening With Me</p>
  </footer>
</body>
</html>
