<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{title}}</title>
  <link rel="stylesheet" href="{{assetPath}}assets/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-shell header-inner">
      <a class="brand" href="{{homePath}}" aria-label="Listening With Me Home">
        <span class="brand-mark">听</span>
        <span>
          <strong>Listening With Me</strong>
          <small data-i18n="brand_tagline">Gentle stories for steady progress</small>
        </span>
      </a>
      <nav class="header-controls" aria-label="Primary navigation">
        <a class="nav-tab is-active" href="{{homePath}}" data-i18n="home">Home</a>
        <div class="nav-dropdown">
          <a class="nav-tab nav-dropdown-trigger" href="{{homePath}}#languages" data-i18n="languages" aria-haspopup="true" aria-expanded="false">Languages</a>
          <div class="nav-dropdown-menu" aria-label="Language channels">
            <a class="nav-dropdown-item active" href="{{homePath}}/chinese/">
              <span>Chinese Listening With Me</span>
            </a>
            <span class="nav-dropdown-item disabled">
              <span>Vietnamese Listening With Me</span>
              <span class="soon-badge">Soon</span>
            </span>
            <span class="nav-dropdown-item disabled">
              <span>Korean Listening With Me</span>
              <span class="soon-badge">Soon</span>
            </span>
            <span class="nav-dropdown-item disabled">
              <span>Japanese Listening With Me</span>
              <span class="soon-badge">Soon</span>
            </span>
          </div>
        </div>
        <a class="nav-tab" href="{{homePath}}#how-it-works" data-i18n="how_it_works">How it works</a>
        <a class="nav-tab" href="{{homePath}}/chinese/#latest-lessons" data-i18n="latest_lessons">Latest Lessons</a>
      </nav>
      <div class="header-right">
        <select id="interface-language" class="lang-select" aria-label="Interface language">
          <option value="en">English</option>
          <option value="vi">Tiếng Việt</option>
        </select>
      </div>
    </div>
  </header>
  <main class="site-main">{{content}}</main>
  <footer class="site-footer site-shell">
    <p>© Listening With Me</p>
  </footer>

  <script>
    (function () {
      const dropdown = document.querySelector('.nav-dropdown');
      if (!dropdown) return;

      const trigger = dropdown.querySelector('.nav-dropdown-trigger');
      const menu = dropdown.querySelector('.nav-dropdown-menu');
      if (!trigger || !menu) return;

      const canHover = window.matchMedia('(hover: hover) and (pointer: fine)').matches;

      function setOpen(isOpen) {
        dropdown.classList.toggle('is-open', isOpen);
        trigger.setAttribute('aria-expanded', String(isOpen));
      }

      trigger.addEventListener('click', function (event) {
        if (canHover) return;
        event.preventDefault();
        setOpen(!dropdown.classList.contains('is-open'));
      });

      document.addEventListener('click', function (event) {
        if (!dropdown.contains(event.target)) setOpen(false);
      });

      document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape') setOpen(false);
      });

      menu.addEventListener('click', function (event) {
        if (event.target.closest('a')) setOpen(false);
      });
    })();
  </script>
</body>
</html>
